<div class="min-h-screen flex items-center justify-center bg-gradient-to-br from-slate-900 to-rose-900">
  <div class="w-full max-w-md bg-white rounded-xl shadow-xl p-8">
    <div class="flex flex-col items-center mb-8">
      <span class="text-5xl mb-2">💰</span>
      <h1 class="text-2xl font-bold text-slate-900 text-center">Bright Money Lending System</h1>
      <span class="mt-2 text-xs uppercase tracking-widest bg-rose-600 text-white rounded px-3 py-0.5">Members' Portal</span>
    </div>

    <form (ngSubmit)="login()" class="flex flex-col gap-4">
      <div class="flex flex-col gap-1.5">
        <label class="text-sm font-medium text-slate-700">Phone number or email</label>
        <div class="relative">
          <input
            type="text"
            [(ngModel)]="phone"
            name="phone"
            required
            placeholder="+256 700 000 000"
            class="w-full border border-gray-300 rounded-md px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-rose-500 focus:border-transparent pr-10"
          />
          <span class="material-icons absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 text-base">phone</span>
        </div>
      </div>

      <div class="flex flex-col gap-1.5">
        <label class="text-sm font-medium text-slate-700">Password</label>
        <div class="relative">
          <input
            [type]="hidePassword ? 'password' : 'text'"
            [(ngModel)]="password"
            name="password"
            required
            placeholder="••••••••"
            class="w-full border border-gray-300 rounded-md px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-rose-500 focus:border-transparent pr-10"
          />
          <button
            type="button"
            (click)="hidePassword = !hidePassword"
            class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600"
          >
            <span class="material-icons text-base leading-none">{{ hidePassword ? 'visibility_off' : 'visibility' }}</span>
          </button>
        </div>
      </div>

      <button
        type="submit"
        class="w-full mt-2 bg-rose-600 hover:bg-rose-700 text-white font-medium py-2.5 rounded-md transition-colors text-sm"
      >
        Sign In
      </button>

      <p class="text-center text-xs text-slate-500">Don't have an account? <a href="#" class="text-rose-600 hover:underline">Contact your loan officer</a></p>
    </form>
  </div>
</div>
