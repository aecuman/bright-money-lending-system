<div class="mb-6">
  <h1 class="text-2xl font-bold text-slate-900">Repayment Schedule</h1>
</div>

<div class="bg-white border border-gray-200 rounded-lg shadow-sm overflow-hidden">
  <table class="w-full text-sm">
    <thead class="bg-gray-50 border-b border-gray-200">
      <tr>
        <th class="text-left px-4 py-3 text-xs font-semibold text-slate-500 uppercase tracking-wider">#</th>
        <th class="text-left px-4 py-3 text-xs font-semibold text-slate-500 uppercase tracking-wider">Due Date</th>
        <th class="text-right px-4 py-3 text-xs font-semibold text-slate-500 uppercase tracking-wider">Principal (UGX)</th>
        <th class="text-right px-4 py-3 text-xs font-semibold text-slate-500 uppercase tracking-wider">Interest (UGX)</th>
        <th class="text-right px-4 py-3 text-xs font-semibold text-slate-500 uppercase tracking-wider">Total (UGX)</th>
        <th class="text-center px-4 py-3 text-xs font-semibold text-slate-500 uppercase tracking-wider">Status</th>
      </tr>
    </thead>
    <tbody class="divide-y divide-gray-100">
      @for (row of schedule; track row.installment) {
        <tr class="hover:bg-gray-50 transition-colors">
          <td class="px-4 py-3 text-slate-600">{{ row.installment }}</td>
          <td class="px-4 py-3 text-slate-700">{{ row.dueDate }}</td>
          <td class="px-4 py-3 text-right text-slate-700">{{ row.principal }}</td>
          <td class="px-4 py-3 text-right text-slate-700">{{ row.interest }}</td>
          <td class="px-4 py-3 text-right font-medium text-slate-900">{{ row.total }}</td>
          <td class="px-4 py-3 text-center">
            <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium" [class]="statusClass(row.status)">
              {{ row.status }}
            </span>
          </td>
        </tr>
      }
    </tbody>
  </table>
</div>
