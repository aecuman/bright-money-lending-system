<div class="page-header">
  <h1>My Profile</h1>
  <button mat-raised-button color="primary">
    <mat-icon>edit</mat-icon> Edit Profile
  </button>
</div>

<mat-card class="profile-card">
  <mat-card-content>
    <div class="avatar-section">
      <div class="avatar">JM</div>
      <div class="member-info">
        <h2>{{ member.name }}</h2>
        <span class="member-since">Member since {{ member.memberSince }}</span>
      </div>
    </div>

    <mat-divider></mat-divider>

    <div class="details-grid">
      <div class="detail-item">
        <mat-icon>email</mat-icon>
        <div>
          <div class="detail-label">Email</div>
          <div class="detail-value">{{ member.email }}</div>
        </div>
      </div>
      <div class="detail-item">
        <mat-icon>phone</mat-icon>
        <div>
          <div class="detail-label">Phone</div>
          <div class="detail-value">{{ member.phone }}</div>
        </div>
      </div>
      <div class="detail-item">
        <mat-icon>badge</mat-icon>
        <div>
          <div class="detail-label">National ID (NIN)</div>
          <div class="detail-value">{{ member.nin }}</div>
        </div>
      </div>
    </div>
  </mat-card-content>
</mat-card>
