<div class="flex flex-col h-screen">
  <app-topbar></app-topbar>
  <div class="flex flex-1 overflow-hidden">
    <aside class="w-60 bg-slate-900 text-white flex flex-col shrink-0 h-full overflow-y-auto">
      <div class="flex flex-col items-center px-4 py-6 border-b border-white/10">
        <span class="text-3xl mb-1">💰</span>
        <span class="text-sm font-bold tracking-wide">Bright Money</span>
        <span class="text-xs uppercase tracking-widest mt-1 bg-rose-600 text-white rounded px-2 py-0.5">Members</span>
      </div>
      <nav class="flex flex-col gap-1 p-3 flex-1">
        @for (item of navItems; track item.route) {
          <a
            [routerLink]="item.route"
            routerLinkActive="active-link"
            class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-slate-300 hover:bg-white/10 hover:text-white transition-colors text-sm"
          >
            <span class="material-icons text-lg leading-none text-slate-400">{{ item.icon }}</span>
            {{ item.label }}
          </a>
        }
      </nav>
    </aside>
    <main class="flex-1 overflow-y-auto bg-slate-50 p-6">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>
