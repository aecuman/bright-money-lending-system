<div class="page-header">
  <h1>Loan Management</h1>
  <button mat-raised-button color="primary">
    <mat-icon>add</mat-icon> New Loan Application
  </button>
</div>

<mat-tab-group>
  <mat-tab label="All Loans">
    <div class="tab-content">
      <p class="placeholder-text">Full loan list with search and filters will appear here.</p>
    </div>
  </mat-tab>
  <mat-tab label="Pending Approval">
    <div class="tab-content">
      <p class="placeholder-text">Loans awaiting credit manager approval will appear here.</p>
    </div>
  </mat-tab>
  <mat-tab label="Active">
    <div class="tab-content">
      <p class="placeholder-text">Currently active loans will appear here.</p>
    </div>
  </mat-tab>
  <mat-tab label="Overdue">
    <div class="tab-content">
      <p class="placeholder-text">Overdue loans and repayment alerts will appear here.</p>
    </div>
  </mat-tab>
  <mat-tab label="Closed">
    <div class="tab-content">
      <p class="placeholder-text">Closed / fully repaid loans will appear here.</p>
    </div>
  </mat-tab>
</mat-tab-group>
