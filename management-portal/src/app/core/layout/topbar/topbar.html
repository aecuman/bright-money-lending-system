<header class="h-14 bg-white border-b border-gray-200 flex items-center justify-end px-6 gap-3 z-10">
  <button class="p-2 rounded-full hover:bg-gray-100 text-gray-500 transition-colors">
    <span class="material-icons text-xl leading-none">notifications</span>
  </button>

  <div class="relative">
    <button
      (click)="toggleMenu()"
      class="flex items-center gap-2 px-3 py-1.5 rounded-lg hover:bg-gray-100 transition-colors"
    >
      <span class="material-icons text-gray-500 text-xl leading-none">account_circle</span>
      <span class="text-sm font-medium text-gray-700">{{ userName }}</span>
      <span class="material-icons text-gray-400 text-base leading-none">expand_more</span>
    </button>

    @if (menuOpen()) {
      <div class="absolute right-0 mt-1 w-44 bg-white border border-gray-200 rounded-lg shadow-lg py-1 z-50">
        <button class="w-full flex items-center gap-2 px-4 py-2 text-sm text-gray-700 hover:bg-gray-50">
          <span class="material-icons text-base leading-none text-gray-500">person</span>
          Profile
        </button>
        <button class="w-full flex items-center gap-2 px-4 py-2 text-sm text-gray-700 hover:bg-gray-50">
          <span class="material-icons text-base leading-none text-gray-500">logout</span>
          Logout
        </button>
      </div>
    }
  </div>
</header>
